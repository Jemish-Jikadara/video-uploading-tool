<!DOCTYPE html>
<html lang="en">
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-container {
    background: white;
    padding: 50px 40px;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 420px;
}

.logo-section {
    text-align: center;
    margin-bottom: 40px;
}

h2 {
    color: #1e293b;
    margin-bottom: 10px;
    font-size: 32px;
    font-weight: 700;
}

.subtitle {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    color: #475569;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
}

input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.3s ease;
    font-family: inherit;
    background: #f8fafc;
}

input:focus {
    outline: none;
    border-color: #1e3a8a;
    background: white;
    box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1e3a8a 0%, #0f3460 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3);
}

button:active {
    transform: translateY(0);
}

.error-message {
    display: none;
    background: #fee2e2;
    color: #991b1b;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    border-left: 4px solid #dc2626;
}

@media (max-width: 768px) {
    .login-container {
        padding: 40px 30px;
    }

    h2 {
        font-size: 28px;
    }
}

@media (max-width: 480px) {
    .login-container {
        padding: 30px 20px;
    }

    h2 {
        font-size: 24px;
    }

    input {
        font-size: 16px;
    }
}
</style>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Professional Portal</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="login-container">
            <div class="logo-section">
                <h2>Welcome</h2>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <div class="error-message" id="errorMessage"> ONLY HOST CAN
                Login</div>

            <div class="form-group">
                <label for="username">Username or Email</label>
                <input id="username" type="text"
                    placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password"
                    placeholder="Enter your password">
            </div>

            <button onclick="login()">Sign In</button>
        </div>

        <script>
      
async function login(){

 const username=document.getElementById("username").value
 const password=document.getElementById("password").value
            
 const res = await fetch("/login",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({username,password})
 })

 const data = await res.json()

 if(data.success){

  localStorage.setItem("role",data.role)

  window.location="index.html"

 }else{

  alert("Login Failed")

 }

}
    </script>
    </body>

</html>
